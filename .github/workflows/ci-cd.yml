name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 允许手动触发

env:
  FLUTTER_VERSION: '3.41.9'
  JAVA_VERSION: '17'

jobs:
  # Job 1: 代码质量检查
  analyze:
    name: 🔍 代码分析
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'

      - name: 🐦 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 获取依赖
        run: flutter pub get

      - name: 🔍 运行分析
        run: flutter analyze

      - name: 🎨 检查代码格式
        run: dart format --set-exit-if-changed .

  # Job 2: 单元测试
  test:
    name: 🧪 单元测试
    runs-on: ubuntu-latest
    needs: analyze
    
    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'

      - name: 🐦 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 获取依赖
        run: flutter pub get

      - name: 🧪 运行测试
        run: flutter test --coverage

      - name: 📊 上传测试覆盖率
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  # Job 3: Android 构建
  build-android:
    name: 🤖 Android 构建
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'

      - name: 🐦 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 获取依赖
        run: flutter pub get

      - name: 🔧 构建 APK (Debug)
        run: flutter build apk --debug

      - name: 🔧 构建 APK (Release)
        run: flutter build apk --release

      - name: 🔧 构建 App Bundle
        run: flutter build appbundle --release

      - name: 📤 上传 APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: 📤 上传 APK (Release)
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: 📤 上传 AAB (Release)
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

  # Job 4: Web 构建
  build-web:
    name: 🌐 Web 构建
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🐦 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 获取依赖
        run: flutter pub get

      - name: 🔧 构建 Web
        run: flutter build web --release

      - name: 📤 上传 Web 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web/
          retention-days: 30

  # Job 5: 部署到 Firebase Hosting (Web)
  deploy-web:
    name: 🚀 部署 Web 到 Firebase
    runs-on: ubuntu-latest
    needs: build-web
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production
    
    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 📥 下载 Web 构建产物
        uses: actions/download-artifact@v4
        with:
          name: web-release
          path: build/web/

      - name: 🔥 部署到 Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live

  # Job 6: 创建 GitHub Release (仅在打 tag 时)
  release:
    name: 🏷️ 创建 Release
    runs-on: ubuntu-latest
    needs: [build-android, build-web]
    if: success() && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 📥 下载 Android 构建产物
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: artifacts/

      - name: 📥 下载 Web 构建产物
        uses: actions/download-artifact@v4
        with:
          name: web-release
          path: artifacts/web/

      - name: 🏷️ 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-release.apk
            artifacts/app-release.aab
          body: |
            ## 🎉 Fitness Log App ${{ github.ref_name }}
            
            ### 📦 构建产物
            - APK (Android): app-release.apk
            - AAB (Android App Bundle): app-release.aab
            - Web: 已部署到 Firebase Hosting
            
            ### 📝 变更日志
            请查看 [CHANGELOG.md](CHANGELOG.md)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
