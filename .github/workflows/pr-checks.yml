name: PR Checks

on:
  pull_request:
    branches: [ main, master, develop ]
    types: [opened, synchronize, reopened]

jobs:
  # PR 代码质量检查
  pr-analyze:
    name: 🔍 PR 代码检查
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史，用于 diff

      - name: ☕ 设置 Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: 🐦 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: 📦 获取依赖
        run: flutter pub get

      - name: 🔍 运行分析
        run: flutter analyze

      - name: 🎨 检查代码格式
        run: |
          dart format --set-exit-if-changed . || (
            echo "❌ 代码格式不符合规范，请运行 'dart format .'" &&
            exit 1
          )

      - name: 🧪 运行测试
        run: flutter test

  # PR 构建检查
  pr-build:
    name: 🔧 PR 构建检查
    runs-on: ubuntu-latest
    needs: pr-analyze
    
    strategy:
      matrix:
        include:
          - target: android-debug
            build-command: flutter build apk --debug
          - target: web
            build-command: flutter build web --release
    
    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: ☕ 设置 Java (Android)
        if: matrix.target == 'android-debug'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: 🐦 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: 📦 获取依赖
        run: flutter pub get

      - name: 🔧 构建 (${{ matrix.target }})
        run: ${{ matrix.build-command }}

      - name: ✅ 构建成功
        run: echo "✅ ${{ matrix.target }} 构建成功！"
